<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Monitoring Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

.header{
background:#111827;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0px 3px 8px rgba(0,0,0,0.1);
}

.status{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.metric{
font-size:18px;
margin-top:6px;
}

.timeline{
max-height:320px;
overflow-y:auto;
font-size:14px;
line-height:1.6;
}

@media(max-width:768px){

.container{
grid-template-columns:1fr;
}

.status{
font-size:20px;
}

.header{
font-size:20px;
padding:15px;
}

}

canvas{
max-width:100%;
height:250px;
}

.safe{color:green;}
.warn{color:orange;}
.critical{color:red;}

</style>

</head>

<body>

<div class="header">

Driver Monitoring Dashboard

</div>


<div class="container">


<!-- PRIMARY STATUS PANEL -->

<div class="card">

<h3>Fatigue Score</h3>
<p class="status" id="fatigue"></p>

<h3>Emotion</h3>
<p class="status" id="emotion"></p>

<h3>Phone Detection</h3>
<p class="status" id="phone"></p>

<h3>Lane Drift Risk</h3>
<p class="status" id="lane"></p>

<h3>Driver Safety Status</h3>
<p class="status" id="safetyStatus"></p>

</div>


<!-- ADVANCED METRICS PANEL -->

<div class="card">

<h3>Driver Risk Index</h3>
<p class="status" id="riskScore"></p>

<h3>Attention Stability</h3>
<p class="status" id="attentionScore"></p>

<h3>Session Duration</h3>
<p class="metric" id="sessionDuration"></p>

<h3>Session Avg Fatigue</h3>
<p class="metric" id="avgFatigue"></p>

</div>


<!-- FATIGUE CHART -->

<div class="card">
<canvas id="fatigueChart"></canvas>
</div>


<!-- EAR CHART -->

<div class="card">
<canvas id="earChart"></canvas>
</div>


<!-- LANE DRIFT CHART -->

<div class="card">
<canvas id="laneChart"></canvas>
</div>


<!-- RISK SCORE TREND CHART -->

<div class="card">
<canvas id="riskChart"></canvas>
</div>


<!-- EVENT COUNTER PANEL -->

<div class="card">

<h3>Session Event Counters</h3>

<div class="metric" id="fatigueEvents"></div>
<div class="metric" id="phoneEvents"></div>
<div class="metric" id="laneEvents"></div>

</div>


<!-- TIMELINE PANEL -->

<div class="card">

<h3>Driver Event Timeline</h3>

<div id="timeline" class="timeline">

Loading timeline...

</div>

</div>


</div>


<script>

let fatigueChart;
let earChart;
let laneChart;
let riskChart;

let startTime = Date.now();


async function fetchData(){

const response = await fetch("/data");
const data = await response.json();

if(!data.latest) return;


/* ORIGINAL STATUS VALUES */

document.getElementById("fatigue").innerText =
data.latest.fatigue_score;

document.getElementById("emotion").innerText =
data.latest.emotion;

document.getElementById("phone").innerText =
data.latest.phone_detected;

document.getElementById("lane").innerText =
data.latest.lane_drift_probability;


/* NEW SAFETY STATUS ENGINE */

updateSafetyStatus(data.latest);

/* NEW SESSION METRICS */

updateSessionMetrics(data.history);

/* CHARTS */

updateCharts(data.history);

/* TIMELINE */

updateTimeline(data.history);

}


/* SAFETY STATUS ENGINE */

function updateSafetyStatus(latest){

let score = latest.fatigue_score;

let statusText = "";

if(score < 25){

statusText="SAFE";
className="safe";

}
else if(score < 50){

statusText="CAUTION";
className="warn";

}
else{

statusText="CRITICAL";
className="critical";

}

let el=document.getElementById("safetyStatus");

el.innerText=statusText;
el.className="status "+className;

}


/* SESSION METRICS ENGINE */

function updateSessionMetrics(history){

let fatigueAvg =
history.reduce((a,b)=>a+b.fatigue_score,0)
/history.length;

document.getElementById("avgFatigue").innerText =
fatigueAvg.toFixed(2);


let duration =
(Math.floor((Date.now()-startTime)/60000));

document.getElementById("sessionDuration").innerText =
duration+" minutes";


let fatigueEvents =
history.filter(x=>x.fatigue_score>=40).length;

let phoneEvents =
history.filter(x=>x.phone_detected==true).length;

let laneEvents =
history.filter(x=>x.lane_drift_probability>=20).length;

document.getElementById("fatigueEvents").innerText =
"Fatigue Alerts: "+fatigueEvents;

document.getElementById("phoneEvents").innerText =
"Phone Events: "+phoneEvents;

document.getElementById("laneEvents").innerText =
"Lane Drift Events: "+laneEvents;


/* DRIVER RISK SCORE */

let riskScore =
Math.min(100,
fatigueAvg*0.6 +
phoneEvents*2 +
laneEvents*1.5
);

document.getElementById("riskScore").innerText =
riskScore.toFixed(1);


/* ATTENTION STABILITY */

let stability =
100-riskScore;

document.getElementById("attentionScore").innerText =
stability.toFixed(1)+"%";

}


/* CHART ENGINE */

function updateCharts(history){

const labels =
history.map(row=>row.timestamp);

const fatigueValues =
history.map(row=>row.fatigue_score);

const earValues =
history.map(row=>row.EAR);

const laneValues =
history.map(row=>row.lane_drift_probability);

const riskValues =
history.map(row=>row.fatigue_score*0.7);


/* FATIGUE CHART */

if(fatigueChart) fatigueChart.destroy();

fatigueChart =
new Chart(document.getElementById("fatigueChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Fatigue Score",data:fatigueValues}]},
options:{responsive:true,maintainAspectRatio:false}
});


/* EAR CHART */

if(earChart) earChart.destroy();

earChart =
new Chart(document.getElementById("earChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"EAR Trend",data:earValues}]},
options:{responsive:true,maintainAspectRatio:false}
});


/* LANE CHART */

if(laneChart) laneChart.destroy();

laneChart =
new Chart(document.getElementById("laneChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Lane Drift Risk",data:laneValues}]},
options:{responsive:true,maintainAspectRatio:false}
});


/* RISK CHART */

if(riskChart) riskChart.destroy();

riskChart =
new Chart(document.getElementById("riskChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Risk Index",data:riskValues}]},
options:{responsive:true,maintainAspectRatio:false}
});

}


/* TIMELINE ENGINE */

function updateTimeline(history){

let timelineHTML = "";

history.slice(-20).reverse().forEach(row => {

let eventDetected = false;

let eventText = "";


/* FATIGUE ALERT */

if(row.fatigue_score >= 40){

eventText += "⚠️ Fatigue spike detected<br>";

eventDetected = true;

}


/* PHONE DISTRACTION */

if(row.phone_detected === true){

eventText += "📱 Phone distraction detected<br>";

eventDetected = true;

}


/* LANE DRIFT ALERT */

if(row.lane_drift_probability >= 20){

eventText += "🚗 Lane drift risk increased<br>";

eventDetected = true;

}


/* EMOTION ALERT */

if(row.emotion === "angry"){

eventText += "😠 Emotion changed: angry<br>";

eventDetected = true;

}


/* ADD TIMESTAMPED ENTRY */

if(eventDetected){

timelineHTML +=
"<b>" +
row.timestamp +
"</b><br>" +
eventText +
"<hr>";

}

});


document.getElementById("timeline").innerHTML =
timelineHTML ||
"✅ No recent risk events detected";

}


setInterval(fetchData,1000);

</script>

</body>

</html>
