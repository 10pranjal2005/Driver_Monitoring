<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Monitoring Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6f8;
}

.header{
background:#111827;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0px 3px 8px rgba(0,0,0,0.1);
}

.status{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

/* TIMELINE PANEL */

.timeline{
max-height:320px;
overflow-y:auto;
font-size:14px;
line-height:1.6;
}

/* MOBILE MODE */

@media(max-width:768px){

.container{
grid-template-columns:1fr;
}

.status{
font-size:20px;
}

.header{
font-size:20px;
padding:15px;
}

}

canvas{
max-width:100%;
height:250px;
}

</style>

</head>

<body>

<div class="header">

Driver Monitoring Dashboard

</div>


<div class="container">


<!-- STATUS PANEL -->

<div class="card">

<h3>Fatigue Score</h3>
<p class="status" id="fatigue"></p>

<h3>Emotion</h3>
<p class="status" id="emotion"></p>

<h3>Phone Detection</h3>
<p class="status" id="phone"></p>

<h3>Lane Drift Risk</h3>
<p class="status" id="lane"></p>

</div>


<!-- FATIGUE CHART -->

<div class="card">

<canvas id="fatigueChart"></canvas>

</div>


<!-- EAR CHART -->

<div class="card">

<canvas id="earChart"></canvas>

</div>


<!-- LANE DRIFT CHART -->

<div class="card">

<canvas id="laneChart"></canvas>

</div>


<!-- TIMELINE ANALYTICS PANEL (NEW) -->

<div class="card">

<h3>Driver Event Timeline</h3>

<div id="timeline" class="timeline">

Loading timeline...

</div>

</div>


</div>


<script>


let fatigueChart;
let earChart;
let laneChart;


/* FETCH DATA FROM BACKEND */

async function fetchData(){

const response = await fetch("/data");
const data = await response.json();

if(!data.latest) return;


/* UPDATE STATUS VALUES */

document.getElementById("fatigue").innerText =
data.latest.fatigue_score;

document.getElementById("emotion").innerText =
data.latest.emotion;

document.getElementById("phone").innerText =
data.latest.phone_detected;

document.getElementById("lane").innerText =
data.latest.lane_drift_probability;


/* UPDATE VISUALS */

updateCharts(data.history);

updateTimeline(data.history);

}


/* UPDATE CHARTS */

function updateCharts(history){

const labels =
history.map(row=>row.timestamp);

const fatigueValues =
history.map(row=>row.fatigue_score);

const earValues =
history.map(row=>row.EAR);

const laneValues =
history.map(row=>row.lane_drift_probability);


/* FATIGUE CHART */

if(fatigueChart) fatigueChart.destroy();

fatigueChart =
new Chart(
document.getElementById("fatigueChart"),
{
type:"line",

data:{
labels:labels,

datasets:[
{
label:"Fatigue Score",
data:fatigueValues
}
]
},

options:{
responsive:true,
maintainAspectRatio:false
}

}
);


/* EAR CHART */

if(earChart) earChart.destroy();

earChart =
new Chart(
document.getElementById("earChart"),
{
type:"line",

data:{
labels:labels,

datasets:[
{
label:"EAR Trend",
data:earValues
}
]
},

options:{
responsive:true,
maintainAspectRatio:false
}

}
);


/* LANE DRIFT CHART */

if(laneChart) laneChart.destroy();

laneChart =
new Chart(
document.getElementById("laneChart"),
{
type:"line",

data:{
labels:labels,

datasets:[
{
label:"Lane Drift Risk",
data:laneValues
}
]
},

options:{
responsive:true,
maintainAspectRatio:false
}

}
);

}


/* TIMELINE ANALYTICS ENGINE (NEW) */

function updateTimeline(history){

let timelineHTML = "";

history.slice(-20).reverse().forEach(row => {

let eventDetected = false;

let eventText = "";


/* FATIGUE ALERT */

if(row.fatigue_score >= 40){

eventText += "⚠️ Fatigue spike detected<br>";

eventDetected = true;

}


/* PHONE DISTRACTION */

if(row.phone_detected === true){

eventText += "📱 Phone distraction detected<br>";

eventDetected = true;

}


/* LANE DRIFT */

if(row.lane_drift_probability >= 20){

eventText += "🚗 Lane drift risk increased<br>";

eventDetected = true;

}


/* EMOTION ALERT */

if(row.emotion === "angry"){

eventText += "😠 Emotion changed: angry<br>";

eventDetected = true;

}


/* ADD ENTRY */

if(eventDetected){

timelineHTML +=

"<b>" +

row.timestamp +

"</b><br>" +

eventText +

"<hr>";

}

});


document.getElementById("timeline").innerHTML =

timelineHTML ||

"✅ No recent risk events detected";

}


/* AUTO REFRESH EVERY SECOND */

setInterval(fetchData,1000);


</script>

</body>

</html>
